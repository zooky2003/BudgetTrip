<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Trip | Welcome</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .main-container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 500px;
        width: 90%;
      }
      h1 {
        color: #333;
        margin-bottom: 30px;
      }

      .button-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .btn {
        display: block;
        padding: 18px;
        border-radius: 12px;
        text-decoration: none;
        color: white;
        font-weight: bold;
        font-size: 1.1rem;
        transition:
          transform 0.2s,
          filter 0.2s;
      }

      .btn:hover {
        transform: scale(1.03);
        filter: brightness(1.1);
      }

      /* Fun Colors */
      .btn-login {
        background: #4e73df;
      } /* Blue */
      .btn-reg {
        background: #1cc88a;
      } /* Green */
      .btn-dash {
        background: #f6c23e;
      } /* Yellow */
      .btn-trip {
        background: #36b9cc;
      } /* Cyan */
      .btn-admin {
        background: #e74a3b;
      } /* Red */

      .footer {
        margin-top: 25px;
        font-size: 0.8rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <h1>🌍 Budget Trip</h1>
      <p style="color: #666; margin-bottom: 25px">Where are we going today?</p>

      <div class="button-grid">
        <a th:href="@{/login}" class="btn btn-login">Login to My Account</a>
        <a th:href="@{/register}" class="btn btn-reg">Create New Account</a>
        <a th:href="@{/dashboard}" class="btn btn-dash">Go to My Dashboard</a>
        <a th:href="@{/create-trip}" class="btn btn-trip">✈️ Plan a New Trip</a>
        <a th:href="@{/admin-dashboard}" class="btn btn-admin">System Admin</a>
      </div>

      <div class="footer">&copy; 2026 BudgetTrip App</div>
    </div>
  </body>
</html>
